<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>ClaimReady — protected</title>
<style>
  :root{--ink:#0f1c2e;--ink-2:#33475b;--mut:#586a7d;--line:#e2e8f0;--bg:#f7f9fc;--card:#fff;
    --brand:#12447a;--brand-2:#1e6fd0;--amber:#e08a1e;--amber-ink:#985f0e;--good-ink:#137a49;
    --ease:cubic-bezier(.22,1,.36,1)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-2)}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px}

  /* gate */
  .gate{min-height:100vh;display:grid;place-items:center;padding:24px}
  .gatecard{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 10px 30px rgba(15,28,46,.10);padding:30px 28px;text-align:center}
  .lock{width:44px;height:44px;border-radius:12px;margin:0 auto 14px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:grid;place-items:center;color:#fff;font-size:20px}
  .gatecard h1{font-size:20px;margin:0 0 4px;letter-spacing:-.01em}
  .gatecard p{margin:0 0 18px;color:var(--mut);font-size:14px}
  .gateform{display:flex;flex-direction:column;gap:10px}
  .gateform input{font:inherit;font-size:16px;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;text-align:center}
  .gateform input:focus{outline:0;border-color:var(--brand-2);box-shadow:0 0 0 4px rgba(30,111,208,.18)}
  .gateform button{font:inherit;font-weight:700;cursor:pointer;border:0;color:#fff;background:var(--brand);
    padding:12px 16px;border-radius:10px;transition:background .18s var(--ease)}
  .gateform button:hover{background:#0d3763}
  .gateform button:disabled{opacity:.6;cursor:default}
  .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:2px}

  /* brief */
  #brief{display:none;padding:46px 0 80px}
  .doc{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(15,28,46,.06);padding:38px 40px 44px}
  #brief .eyebrow{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--amber-ink);margin-bottom:10px}
  #brief h1{font-size:clamp(26px,4vw,34px);letter-spacing:-.02em;margin:0 0 6px;text-wrap:balance}
  #brief .lead{font-size:18px;color:var(--ink-2);margin:0 0 8px;text-wrap:pretty}
  #brief h2{font-size:20px;letter-spacing:-.01em;margin:32px 0 8px;padding-top:20px;border-top:1px solid var(--line)}
  #brief h3{font-size:16px;margin:20px 0 4px;color:var(--brand)}
  #brief p,#brief li{color:var(--ink-2);font-size:15.5px;text-wrap:pretty}
  #brief ul{padding-left:20px;margin:8px 0}
  #brief li{margin:6px 0}
  #brief strong{color:var(--ink)}
  #brief .src{margin-top:30px;padding-top:16px;border-top:1px dashed var(--line);font-size:12.5px;color:var(--mut)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--mut)}
  .topbar .logo{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--ink)}
  .topbar .mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-size:12px}
  @media(max-width:560px){ .doc{padding:26px 22px 32px} }
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gatecard">
    <div class="lock">🔒</div>
    <h1>Protected</h1>
    <p>This page is password-protected. Enter it to continue.</p>
    <form class="gateform" id="gateform" autocomplete="off">
      <input type="password" id="pw" placeholder="Password" autocomplete="current-password" aria-label="Password" autofocus />
      <button type="submit" id="go">Unlock</button>
      <div class="err" id="err" role="alert"></div>
    </form>
  </div>
</div>

<main id="brief"><div class="wrap">
  <div class="topbar">
    <span class="logo"><span class="mark">✓</span>ClaimReady</span>
    <span>Confidential</span>
  </div>
  <div class="doc" id="briefbody"></div>
</div></main>

const gate = document.getElementById('gate');
const form = document.getElementById('gateform');
const pwEl = document.getElementById('pw');
const errEl = document.getElementById('err');
const goEl = document.getElementById('go');

const dec64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:dec64(BLOB.salt), iterations:BLOB.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:dec64(BLOB.iv) }, key, dec64(BLOB.ct));
  return new TextDecoder().decode(pt);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = pwEl.value;
  if(!pw) return;
  goEl.disabled = true; goEl.textContent = 'Unlocking…'; errEl.textContent = '';
  try{
    const html = await decrypt(pw);
    document.getElementById('briefbody').innerHTML = html;
    gate.style.display = 'none';
    document.getElementById('brief').style.display = 'block';
    document.title = 'The Vault — Opportunity Brief';
  }catch(err){
    goEl.disabled = false; goEl.textContent = 'Unlock';
    errEl.textContent = 'Incorrect password.';
    pwEl.select();
  }
});
</script>
